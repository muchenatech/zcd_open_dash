# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: coza.dischem.zcdpopendash
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: http://fiohd01.dischem.local:8000
          client: '500'
        app:
          name: ZCDP_OPEN_DASH
          description: Open Delivery Dashboard
          package: ZCDP
          transport: FDVK907676
        exclude:
          - /test/
